# Demo rule: fires after /simulate-error bumps the counter (real Prometheus → Alertmanager flow).
groups:
  - name: ascent_realistic_demo
    rules:
      - alert: SyntheticElevatedErrors
        expr: increase(synthetic_errors_simulated_total[2m]) > 0
        for: 30s
        labels:
          severity: warning
          service: checkout-demo
          environment: staging
        annotations:
          summary: "Synthetic probe reported elevated errors (realistic demo)"
          description: >
            Someone called POST /simulate-error on the synthetic-probe service.
            This alert was generated by Prometheus (not hand-typed JSON) and forwarded
            by Alertmanager to Ascent — same pattern as production monitoring.

  # Demo web app at http://localhost:9110 — "Trip checkout" sets gauge → Ascent incident.
  - name: demo_webapp_checkout
    rules:
      - alert: DemoWebappCheckoutBroken
        expr: demo_webapp_checkout_broken == 1
        for: 30s
        labels:
          severity: critical
          service: demo-checkout-webapp
          environment: staging
        annotations:
          summary: "Demo webapp: checkout broken (simulated bad deploy)"
          description: >
            Open http://localhost:9110 — you tripped checkout. Prometheus scraped
            demo_webapp_checkout_broken=1. Heal from the UI or POST /admin/heal to clear.
            Forwarded to Ascent via Alertmanager for full incident workflow testing.
