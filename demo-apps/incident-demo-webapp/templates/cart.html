{% extends "base.html" %}
{% block title %}Cart{% endblock %}
{% block content %}
<h1 class="section-title" style="font-size:1.85rem">Your cart</h1>
<div id="cart-root"></div>
{% endblock %}

{% block scripts %}
<script>
function renderCart() {
  const root = document.getElementById("cart-root");
  const cart = getCart();
  if (!cart.length) {
    root.innerHTML = `<div class="empty-state"><p>Your cart is empty.</p><a class="btn btn-primary" href="/shop" style="margin-top:1rem;display:inline-flex">Continue shopping</a></div>`;
    return;
  }

  let rows = cart.map((line, idx) => `
    <tr>
      <td>${line.name}</td>
      <td>$${Number(line.price).toFixed(2)}</td>
      <td>${line.qty}</td>
      <td><button type="button" class="btn btn-outline" style="padding:.3rem .5rem;font-size:.8rem" onclick="removeLine(${idx})">Remove</button></td>
    </tr>`).join("");

  const subtotal = cart.reduce((s, l) => s + l.price * l.qty, 0);

  root.innerHTML = `
    <table class="cart-table">
      <thead><tr><th>Item</th><th>Price</th><th>Qty</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="display:flex;flex-wrap:wrap;gap:1rem;align-items:center;margin-top:1.25rem;justify-content:space-between">
      <strong>Subtotal: $${subtotal.toFixed(2)}</strong>
      <button type="button" class="btn btn-primary" onclick="placeOrder()">Place order (checkout)</button>
    </div>
    <p style="font-size:.85rem;color:var(--muted);margin-top:.75rem">Calls <code>POST /checkout</code>. If checkout is tripped, you will see an error — that is the incident trigger path when combined with Prometheus.</p>
    <p style="font-size:.85rem;color:var(--muted);margin-top:.35rem">Checkout stuck or wrong charge? <a href="/support">Open a support ticket</a> (sent to Ascent).</p>`;
}

function removeLine(idx) {
  const cart = getCart();
  cart.splice(idx, 1);
  setCart(cart);
  renderCart();
}

async function placeOrder() {
  const cart = getCart();
  const r = await fetch("/checkout", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ items: cart }),
  });
  const text = await r.text();
  if (!r.ok) {
    toast("Checkout failed — " + text, true);
    return;
  }
  let data = {};
  try { data = JSON.parse(text); } catch (_) {}
  toast("Order placed! " + (data.order_id || ""));
  setCart([]);
  renderCart();
}

document.addEventListener("DOMContentLoaded", renderCart);
</script>
{% endblock %}
