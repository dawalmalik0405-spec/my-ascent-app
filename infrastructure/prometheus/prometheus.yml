global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # Ascent API metrics (HITL / LLM / tools). Uses host so start.ps1 (API on host) still scrapes.
  - job_name: "ascent-api"
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: /metrics

  # Demo probe — POST /simulate-error bumps counter → Prometheus rule → Alertmanager → Ascent.
  - job_name: "synthetic-probe"
    static_configs:
      - targets: ["synthetic-probe:9109"]
    metrics_path: /metrics

  # Mini "customer" app: http://localhost:9110 — trip → Prometheus → Alertmanager → Ascent.
  - job_name: "demo-webapp"
    static_configs:
      - targets: ["demo-webapp:9110"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
